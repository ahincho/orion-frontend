<div class="day-carousel" role="tablist" [attr.aria-label]="'myRoutes.carousel.ariaLabel' | translate">
  @for (day of days(); track day.fecha) {
    <button
      type="button"
      role="tab"
      class="day-carousel__item"
      [class.day-carousel__item--active]="day.fecha === selectedDate()"
      [attr.aria-selected]="day.fecha === selectedDate()"
      (click)="onPick(day.fecha)"
    >
      <span class="day-carousel__label">{{ day.label }}</span>
        <span class="day-carousel__summary">
        @if (day.summary) {
          {{ day.summary.householdsCompleted }}/{{ day.summary.totalHouseholds }}
        } @else {
          —
        }
      </span>
    </button>
  }
</div>
