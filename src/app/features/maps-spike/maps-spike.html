<section class="maps-spike">
  <header class="maps-spike__header">
    <div>
      <p class="maps-spike__eyebrow">Spike · MapLibre GL JS</p>
      <h1 class="maps-spike__title">Renderizado de mapa base</h1>
      <p class="maps-spike__subtitle">
        Validación previa a la Fase 1. Drag the red marker para confirmar que
        el motor responde a eventos del browser.
      </p>
    </div>
    <span
      class="maps-spike__badge"
      [class.maps-spike__badge--ready]="status() === 'ready'"
      [class.maps-spike__badge--loading]="status() === 'loading'"
      [class.maps-spike__badge--error]="status() === 'error'"
    >
      {{ status() }}
    </span>
  </header>

  <div #host class="maps-spike__canvas"></div>

  <footer class="maps-spike__footer">
    <dl class="maps-spike__coords">
      <div>
        <dt>lng</dt>
        <dd>{{ lngLabel() }}</dd>
      </div>
      <div>
        <dt>lat</dt>
        <dd>{{ latLabel() }}</dd>
      </div>
      <div>
        <dt>zoom</dt>
        <dd>{{ zoomLabel() }}</dd>
      </div>
    </dl>
    <button type="button" class="maps-spike__reset" (click)="reset()">
      Centrar en Lima
    </button>
  </footer>
</section>
