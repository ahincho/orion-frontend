<section class="maps-spike">
  <header class="maps-spike__header">
    <div>
      <p class="maps-spike__eyebrow">Spike &middot; MapLibre GL JS</p>
      <h1 class="maps-spike__title">Map base rendering</h1>
      <p class="maps-spike__subtitle">
        Drag the red marker to confirm the engine responds to browser
        events.
      </p>
    </div>
    <span
      class="maps-spike__badge"
      [class.maps-spike__badge--ready]="mapShell.status() === 'ready'"
      [class.maps-spike__badge--loading]="mapShell.status() === 'loading'"
      [class.maps-spike__badge--error]="mapShell.status() === 'error'"
    >
      {{ mapShell.status() }}
    </span>
  </header>

  <orion-map-shell
    #mapShell
    class="maps-spike__canvas"
    [styleUrl]="styleUrl()"
    [center]="center()"
    [zoom]="zoom()"
    (mapReady)="onMapReady($event)"
  />

  <footer class="maps-spike__footer">
    <dl class="maps-spike__coords">
      <div>
        <dt>lng</dt>
        <dd>{{ lngLabel() }}</dd>
      </div>
      <div>
        <dt>lat</dt>
        <dd>{{ latLabel() }}</dd>
      </div>
      <div>
        <dt>zoom</dt>
        <dd>{{ zoomLabel() }}</dd>
      </div>
    </dl>
    <button type="button" class="maps-spike__reset" (click)="reset()">
      Center on Lima
    </button>
  </footer>
</section>
