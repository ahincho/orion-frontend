<div class="mx-auto max-w-6xl space-y-6">
  <header class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Seguimiento Post-Venta</h1>
    <p class="mt-1 text-sm text-slate-600">
      Programación de encuestas post-venta respetando la política de hostigamiento comercial
      sobre los clientes ya visitados.
    </p>
  </header>

  <section
    class="grid place-items-center rounded-lg border border-dashed border-slate-300 bg-white p-12 text-center"
    aria-label="Sección en construcción"
  >
    <div class="max-w-md space-y-3">
      <div class="mx-auto grid h-12 w-12 place-items-center rounded-full bg-rose-100 text-rose-700">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
      </div>
      <h2 class="text-base font-semibold text-slate-800">Próximamente</h2>
      <p class="text-sm text-slate-600">
        Calendario sugerido de encuestas post-venta por hogar, generado a partir del historial
        de encuestas y formularios en DynamoDB.
      </p>
    </div>
  </section>
</div>
