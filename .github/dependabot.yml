# Dependabot configuration for orion-frontend.
# - Weekly npm bumps (Angular, ESLint, etc.).
# - Weekly GitHub Actions bumps (actions/checkout, setup-node, etc.).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "angular-eslint"
          - "@angular-eslint/*"
      dev-deps:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "eslint"
          - "@eslint/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
