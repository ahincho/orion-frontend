# =============================================================================
# CI - Lint & Test (orion-frontend)
# =============================================================================
# Pull request linter + test runner. Calls the ecosystem + node reusables
# from `spark-match/spark-match-01-devops/.github/workflows/...` (all pinned
# `@main` per AGENTS.md).
#
# Jobs:
#   - actionlint   :: GH Actions syntax  (ecosystem)
#   - gitleaks     :: secret history     (ecosystem)
#   - yamllint     :: YAML lint          (ecosystem)
#   - eslint       :: npm run lint       (node, angular-eslint flat config)
#   - test         :: npm run test       (node, vitest via @angular/build)
#
# Pin: @main. The reusables were promoted from @dev -> @main in
# spark-match-01-devops PR #45 (end-to-end validated against
# orion-infrastructure PR #24). We mirror that strategy here.
# =============================================================================

name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR + branch. Saves runner minutes on
# rapid pushes. The cancel-in-progress: true is safe for lint jobs (idempotent).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- ecosystem reusables ---------------------------------------

  actionlint:
    name: actionlint
    uses: spark-match/spark-match-01-devops/.github/workflows/actionlint.yml@main  # yamllint disable-line rule:line-length
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: spark-match/spark-match-01-devops/.github/workflows/gitleaks.yml@main
    with:
      environment-name: ci

  yamllint:
    name: yamllint
    uses: spark-match/spark-match-01-devops/.github/workflows/yamllint.yml@main
    with:
      environment-name: ci

  # ---------- node reusables --------------------------------------------

  eslint:
    name: eslint
    uses: spark-match/spark-match-01-devops/.github/workflows/eslint.yml@main
    with:
      environment-name: ci
      eslint-version: '9'
      lint-script: lint
      working-directory: '.'

  # The Angular 22 unit-test builder (vitest via @angular/build:unit-test)
  # is exposed through the new node-test.yml reusable. We pass pre-test-script
  # to invoke the prebuild hook (which materializes api-config.generated.ts
  # from API_URL) and the test-script override to add --watch=false.
  test:
    name: unit tests
    uses: spark-match/spark-match-01-devops/.github/workflows/node-test.yml@main  # yamllint disable-line rule:line-length
    with:
      environment-name: ci
      pre-test-script: prebuild
      test-script: test -- --watch=false
      working-directory: '.'
